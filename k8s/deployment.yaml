apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp

spec:
  replicas: 2
  selector:
   matchLabels:
      app: myapp

  template:
    metadata:
      labels:
         app: myapp

    spec:
      containers:
       - name:  myapp
         image: shubh9852/myapp:v1
         ports:
           - containerPort: 3000
